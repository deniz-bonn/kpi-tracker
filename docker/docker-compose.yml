version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kpi_tracker
      POSTGRES_USER: kpi_user
      POSTGRES_PASSWORD: ${PGPASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kpi_user -d kpi_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_DIALECT: postgres
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: kpi_tracker
      PGUSER: kpi_user
      PGPASSWORD: ${PGPASSWORD:-changeme}
      PORT: 3001
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
